<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>News Agg Articles</title>
    <style>
      :root {
        color-scheme: light;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
          sans-serif;
        background: #f7fafc;
        color: #0f172a;
      }

      body {
        margin: 0;
      }

      header {
        position: sticky;
        top: 0;
        z-index: 2;
        border-bottom: 1px solid #dbe3ef;
        background: rgba(255, 255, 255, 0.94);
        backdrop-filter: blur(12px);
      }

      .bar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        max-width: 1180px;
        margin: 0 auto;
        padding: 18px 20px;
      }

      h1 {
        margin: 0;
        font-size: 20px;
        letter-spacing: 0;
      }

      .meta {
        color: #64748b;
        font-size: 13px;
      }

      main {
        max-width: 1180px;
        margin: 0 auto;
        padding: 24px 20px 48px;
      }

      .controls {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        margin-bottom: 18px;
      }

      .tabs {
        display: inline-flex;
        gap: 2px;
        border: 1px solid #cbd5e1;
        border-radius: 7px;
        background: #eef3f8;
        padding: 2px;
      }

      .tabs button {
        border: 0;
        background: transparent;
      }

      .tabs button.active {
        background: #0f172a;
        color: #fff;
      }

      input,
      select,
      button {
        height: 38px;
        border: 1px solid #cbd5e1;
        border-radius: 6px;
        background: #fff;
        color: #0f172a;
        font: inherit;
        font-size: 14px;
      }

      input {
        min-width: min(340px, 100%);
        flex: 1;
        padding: 0 12px;
      }

      select,
      button {
        padding: 0 10px;
      }

      button {
        cursor: pointer;
        font-weight: 650;
      }

      .grid {
        display: block;
        columns: 300px;
        column-gap: 12px;
      }

      article {
        display: inline-block;
        width: 100%;
        box-sizing: border-box;
        break-inside: avoid;
        margin: 0 0 12px;
        min-height: 210px;
        border: 1px solid #dbe3ef;
        border-radius: 8px;
        background: #fff;
        padding: 16px;
        box-shadow: 0 10px 24px rgba(15, 23, 42, 0.04);
      }

      article.cluster {
        min-height: 0;
      }

      article.pinned {
        border-color: #f59e0b;
        box-shadow: 0 12px 28px rgba(245, 158, 11, 0.12);
      }

      .pin-button {
        height: 28px;
        border-color: #cbd5e1;
        background: #fff;
        color: #475569;
        padding: 0 9px;
        font-size: 12px;
      }

      .pin-button.active {
        border-color: #f59e0b;
        background: #fffbeb;
        color: #92400e;
      }

      .ai-image {
        position: relative;
        display: block;
        height: 132px;
        margin: -2px -2px 12px;
        border: 1px solid #dbe3ef;
        border-radius: 8px;
        overflow: hidden;
        background: #eef2f7;
      }

      .ai-image img {
        display: block;
        width: 100%;
        height: 100%;
        object-fit: cover;
      }

      .eyebrow {
        display: flex;
        justify-content: space-between;
        gap: 12px;
        margin-bottom: 10px;
        color: #64748b;
        font-size: 12px;
        font-weight: 700;
        text-transform: uppercase;
      }

      h2 {
        margin: 0 0 10px;
        font-size: 17px;
        line-height: 1.35;
        letter-spacing: 0;
      }

      p {
        margin: 0 0 14px;
        color: #334155;
        font-size: 14px;
        line-height: 1.55;
      }

      a {
        color: #0369a1;
        font-size: 14px;
        font-weight: 700;
        text-decoration: none;
      }

      .chips {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
        margin: 12px 0 14px;
      }

      .chip {
        border-radius: 999px;
        background: #e0f2fe;
        color: #075985;
        padding: 3px 8px;
        font-size: 12px;
        font-weight: 700;
      }

      .cluster-list {
        display: flex;
        flex-direction: column;
        gap: 8px;
        margin-top: 12px;
        padding-left: 0;
      }

      .cluster-list li {
        list-style: none;
        border-top: 1px solid #edf2f7;
        padding-top: 8px;
        color: #334155;
        font-size: 13px;
        line-height: 1.45;
      }

      .timeline {
        display: flex;
        flex-direction: column;
        gap: 12px;
        margin-top: 14px;
      }

      .timeline-day {
        border-left: 2px solid #bae6fd;
        padding-left: 14px;
      }

      .timeline-day-title {
        position: relative;
        display: inline-flex;
        align-items: center;
        min-height: 24px;
        margin: 0 0 8px -2px;
        border: 1px solid #bae6fd;
        border-radius: 999px;
        background: #f0f9ff;
        color: #075985;
        padding: 2px 10px;
        font-size: 12px;
        font-weight: 850;
      }

      .timeline-day-title::before {
        content: "";
        position: absolute;
        left: -21px;
        width: 10px;
        height: 10px;
        border-radius: 999px;
        background: #0284c7;
        box-shadow: 0 0 0 4px #e0f2fe;
      }

      .timeline-item {
        position: relative;
        display: grid;
        grid-template-columns: 72px 1fr;
        gap: 10px;
        min-height: 34px;
        margin: 0 0 8px;
        color: #334155;
        font-size: 13px;
        line-height: 1.45;
      }

      .timeline-item::before {
        content: "";
        position: absolute;
        left: -19px;
        top: 10px;
        width: 7px;
        height: 7px;
        border-radius: 999px;
        background: #38bdf8;
        box-shadow: 0 0 0 3px #eff6ff;
      }

      .timeline-time {
        align-self: start;
        border-radius: 6px;
        background: #f1f5f9;
        color: #475569;
        padding: 3px 6px;
        font-size: 11px;
        font-weight: 800;
        text-transform: uppercase;
        text-align: center;
      }

      .timeline-source {
        color: #64748b;
        font-weight: 700;
      }

      .prediction {
        position: relative;
        margin-top: 10px;
        border: 1px solid #fed7aa;
        border-radius: 8px;
        background: #fff7ed;
        color: #7c2d12;
        padding: 10px 12px;
        font-size: 13px;
        line-height: 1.45;
      }

      .prediction::before {
        content: "";
        position: absolute;
        left: -20px;
        top: 16px;
        width: 9px;
        height: 9px;
        border-radius: 999px;
        background: #f97316;
        box-shadow: 0 0 0 4px #ffedd5;
      }

      .prediction-label {
        display: block;
        margin-bottom: 4px;
        color: #9a3412;
        font-size: 11px;
        font-weight: 850;
        text-transform: uppercase;
      }

      .prediction-actions {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-top: 10px;
      }

      .prediction-actions button {
        height: 30px;
        border-radius: 6px;
        font-size: 12px;
      }

      .prediction-actions button.active {
        border-color: #0f172a;
        background: #0f172a;
        color: #fff;
      }

      .vote-count {
        margin-left: 5px;
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono",
          monospace;
        font-size: 11px;
        opacity: 0.75;
      }

      .comments {
        margin-top: 12px;
        border-top: 1px solid #fed7aa;
        padding-top: 10px;
      }

      .comment-form {
        display: flex;
        gap: 8px;
      }

      .comment-form input {
        min-width: 0;
        height: 34px;
        border-color: #fdba74;
        font-size: 13px;
      }

      .comment-form button {
        height: 34px;
        border-color: #fdba74;
        background: #fff;
        color: #9a3412;
        font-size: 12px;
      }

      .comment-list {
        display: flex;
        flex-direction: column;
        gap: 6px;
        margin-top: 9px;
      }

      .comment {
        border-radius: 7px;
        background: rgba(255, 255, 255, 0.72);
        padding: 7px 8px;
        color: #431407;
        font-size: 12.5px;
      }

      .comment-time {
        display: block;
        margin-top: 3px;
        color: #9a3412;
        font-size: 10.5px;
        font-weight: 750;
      }

      .empty {
        border: 1px dashed #cbd5e1;
        border-radius: 8px;
        padding: 36px;
        background: #fff;
        color: #64748b;
        text-align: center;
      }
    </style>
  </head>
  <body>
    <header>
      <div class="bar">
        <div>
          <h1>External Articles</h1>
          <div id="status" class="meta">Loading RSS feeds...</div>
        </div>
        <button id="refresh" type="button">Refresh</button>
      </div>
    </header>

    <main>
      <div class="controls">
        <input id="search" type="search" placeholder="Search headlines, summaries, sources" />
        <select id="domain">
          <option value="">All sectors</option>
        </select>
        <select id="source">
          <option value="">All sources</option>
        </select>
        <div class="tabs" aria-label="View mode">
          <button id="articles-tab" type="button">Articles</button>
          <button id="clusters-tab" type="button" class="active">Timeline</button>
        </div>
      </div>
      <section id="articles" class="grid"></section>
    </main>

    <script>
      const state = {
        articles: [],
        filtered: [],
        clusters: [],
        mode: "clusters",
        votes: readVotes(),
        comments: readComments(),
        pins: readPins(),
      };

      const statusEl = document.querySelector("#status");
      const gridEl = document.querySelector("#articles");
      const searchEl = document.querySelector("#search");
      const domainEl = document.querySelector("#domain");
      const sourceEl = document.querySelector("#source");
      const refreshEl = document.querySelector("#refresh");
      const articlesTabEl = document.querySelector("#articles-tab");
      const clustersTabEl = document.querySelector("#clusters-tab");

      const stopwords = new Set([
        "about",
        "after",
        "again",
        "against",
        "all",
        "also",
        "and",
        "announced",
        "any",
        "are",
        "around",
        "but",
        "because",
        "been",
        "being",
        "between",
        "can",
        "could",
        "for",
        "from",
        "has",
        "have",
        "how",
        "into",
        "its",
        "more",
        "most",
        "news",
        "not",
        "now",
        "our",
        "out",
        "over",
        "new",
        "say",
        "says",
        "the",
        "you",
        "than",
        "that",
        "their",
        "there",
        "these",
        "this",
        "through",
        "under",
        "using",
        "with",
        "would",
        "will",
        "your",
      ]);
      const weakKeywords = new Set(["general", "uncategorized", "article", "articles", "rss"]);

      function shortDate(value) {
        if (!value) return "";
        const date = new Date(value);
        if (Number.isNaN(date.getTime())) return value;
        return date.toLocaleDateString(undefined, { month: "short", day: "numeric" });
      }

      function timelineDate(value) {
        if (!value) return "Unknown date";
        const date = new Date(value);
        if (Number.isNaN(date.getTime())) return value;
        return date.toLocaleString(undefined, {
          month: "short",
          day: "numeric",
          hour: "numeric",
          minute: "2-digit",
        });
      }

      function timelineDay(value) {
        if (!value) return "Unknown date";
        const date = new Date(value);
        if (Number.isNaN(date.getTime())) return value;
        return date.toLocaleDateString(undefined, {
          weekday: "short",
          year: "numeric",
          month: "short",
          day: "numeric",
        });
      }

      function timelineTime(value) {
        if (!value) return "";
        const date = new Date(value);
        if (Number.isNaN(date.getTime())) return "";
        return date.toLocaleTimeString(undefined, {
          hour: "numeric",
          minute: "2-digit",
        });
      }

      function oneLineSummary(article, fallbackKeywords = []) {
        const headline = String(article?.headline || "").replace(/\s+/g, " ").trim();
        const summary = String(article?.summary || "").replace(/\s+/g, " ").trim();
        const base = headline || summary || fallbackKeywords.join(", ") || "Clustered news update";

        if (base.length <= 110) return base;
        return `${base.slice(0, 107).replace(/\s+\S*$/, "")}...`;
      }

      function escapeHtml(value) {
        return String(value || "")
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;")
          .replace(/'/g, "&#39;");
      }

      function hashString(value) {
        let hash = 0;
        const text = String(value || "");
        for (let index = 0; index < text.length; index += 1) {
          hash = (hash << 5) - hash + text.charCodeAt(index);
          hash |= 0;
        }
        return Math.abs(hash);
      }

      function visualLabel(article, fallbackKeywords = []) {
        const words = article?.keywords?.length ? article.keywords : fallbackKeywords;
        return (words || [])
          .slice(0, 2)
          .map((word) => String(word).replace(/-/g, " "))
          .join(" / ")
          .toUpperCase();
      }

      function normalizeImageUrl(value) {
        if (!value) return "";
        if (typeof value === "string") {
          const trimmed = value.trim();
          return /^https?:\/\//i.test(trimmed) ? trimmed : "";
        }
        if (Array.isArray(value)) {
          for (const item of value) {
            const url = normalizeImageUrl(item);
            if (url) return url;
          }
          return "";
        }
        if (typeof value === "object") {
          return normalizeImageUrl(value.url || value.href || value.src || value.thumbnail);
        }
        return "";
      }

      function articleImageUrl(article) {
        const candidates = [
          article?.image,
          article?.imageUrl,
          article?.urlToImage,
          article?.thumbnail,
          article?.thumbnailUrl,
          article?.media,
          article?.mediaContent,
          article?.mediaThumbnail,
          article?.enclosure,
        ];
        for (const candidate of candidates) {
          const url = normalizeImageUrl(candidate);
          if (url) return url;
        }
        return "";
      }

      function articleHasRealImage(article) {
        return Boolean(articleImageUrl(article));
      }

      function clusterImageArticle(cluster) {
        return cluster.articles.find(articleHasRealImage) || cluster.articles[0];
      }

      function visualHeight(article, options = {}) {
        const base = options.cluster ? 112 : 132;
        const range = options.cluster ? 86 : 72;
        return base + (hashString(`${article?.id || ""}${article?.headline || ""}`) % range);
      }

      function generatedVisualSrc(article, options = {}) {
        const text = `${article?.headline || ""} ${article?.summary || ""} ${article?.domain || ""}`;
        const hash = hashString(text);
        const palettes = [
          ["#0f766e", "#f97316", "#ecfeff"],
          ["#2563eb", "#f59e0b", "#eff6ff"],
          ["#be123c", "#0891b2", "#fff1f2"],
          ["#166534", "#e11d48", "#f0fdf4"],
          ["#7c2d12", "#0d9488", "#fff7ed"],
          ["#4338ca", "#84cc16", "#eef2ff"],
          ["#0369a1", "#dc2626", "#f0f9ff"],
        ];
        const [primary, accent, wash] = palettes[hash % palettes.length];
        const label = escapeHtml(visualLabel(article, options.keywords) || article?.domain || "NEWS");
        const title = escapeHtml(oneLineSummary(article, options.keywords));
        const width = 920;
        const height = 360;
        const orbit = 44 + (hash % 44);
        const barA = 120 + (hash % 180);
        const barB = 90 + ((hash >> 3) % 170);
        const barC = 150 + ((hash >> 5) % 140);
        const svg = `
          <svg xmlns="http://www.w3.org/2000/svg" width="${width}" height="${height}" viewBox="0 0 ${width} ${height}" role="img" aria-label="${title}">
            <defs>
              <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
                <stop offset="0" stop-color="${wash}"/>
                <stop offset="0.58" stop-color="#ffffff"/>
                <stop offset="1" stop-color="${primary}" stop-opacity="0.24"/>
              </linearGradient>
              <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
                <path d="M 32 0 L 0 0 0 32" fill="none" stroke="${primary}" stroke-opacity="0.09" stroke-width="1"/>
              </pattern>
            </defs>
            <rect width="${width}" height="${height}" fill="url(#bg)"/>
            <rect width="${width}" height="${height}" fill="url(#grid)"/>
            <circle cx="${width - 126}" cy="82" r="${orbit}" fill="${accent}" fill-opacity="0.22"/>
            <circle cx="${width - 132}" cy="86" r="${Math.max(18, orbit - 18)}" fill="none" stroke="${primary}" stroke-width="10" stroke-opacity="0.28"/>
            <path d="M 0 ${height - 92} C ${width * 0.23} ${height - 162}, ${width * 0.42} ${height - 30}, ${width} ${height - 112} L ${width} ${height} L 0 ${height} Z" fill="${primary}" fill-opacity="0.16"/>
            <rect x="40" y="82" width="${barA}" height="18" rx="9" fill="${primary}" fill-opacity="0.82"/>
            <rect x="40" y="120" width="${barB}" height="12" rx="6" fill="${accent}" fill-opacity="0.72"/>
            <rect x="40" y="146" width="${barC}" height="12" rx="6" fill="#0f172a" fill-opacity="0.15"/>
            <g transform="translate(${width - 246} ${height - 126})">
              <rect x="0" y="0" width="178" height="74" rx="14" fill="#ffffff" fill-opacity="0.76" stroke="${primary}" stroke-opacity="0.32"/>
              <path d="M24 48 L56 22 L86 44 L116 18 L154 48" fill="none" stroke="${accent}" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
              <circle cx="26" cy="24" r="9" fill="${primary}" fill-opacity="0.62"/>
            </g>
            <text x="40" y="${height - 44}" fill="#0f172a" font-family="Inter, Arial, sans-serif" font-size="26" font-weight="800" letter-spacing="0">${label}</text>
          </svg>
        `;
        return `data:image/svg+xml;charset=UTF-8,${encodeURIComponent(svg)}`;
      }

      function articleVisual(article, options = {}) {
        const generatedSrc = generatedVisualSrc(article, options);
        const realSrc = articleImageUrl(article);
        const src = realSrc || generatedSrc;
        const title = escapeHtml(oneLineSummary(article, options.keywords));
        return `<span class="ai-image ${realSrc ? "source-image" : "generated-image"}" style="height: ${visualHeight(article, options)}px">
          <img alt="Image for ${title}" src="${escapeHtml(src)}" data-fallback="${escapeHtml(generatedSrc)}" loading="lazy" onerror="this.onerror=null; this.src=this.dataset.fallback;" />
        </span>`;
      }

      function predictNextStep(cluster) {
        const keywords = cluster.topKeywords.slice(0, 3).join(", ");
        const sourceCount = cluster.sources.size;
        const articleCount = cluster.articles.length;
        const leadDomain = cluster.articles[0]?.domain || "this topic";
        const latest = cluster.articles[0];
        const latestSource = latest?.source ? `${latest.source} and adjacent sources` : "more sources";

        if (sourceCount >= 4 || articleCount >= 6) {
          return `Expect follow-up coverage from ${latestSource} within the next cycle, with attention shifting from the headline event to evidence, reactions, and market impact around ${keywords}.`;
        }

        if (articleCount >= 3) {
          return `This looks like an emerging thread. If the sequence continues, the next update will likely clarify who is affected and whether ${keywords} becomes a broader ${leadDomain} story.`;
        }

        return `This is still an early signal. Watch for another source to confirm whether ${keywords || leadDomain} develops into a durable story.`;
      }

      function readVotes() {
        try {
          return JSON.parse(localStorage.getItem("newsAggPredictionVotes") || "{}");
        } catch {
          return {};
        }
      }

      function readComments() {
        try {
          return JSON.parse(localStorage.getItem("newsAggPredictionComments") || "{}");
        } catch {
          return {};
        }
      }

      function readPins() {
        try {
          return JSON.parse(localStorage.getItem("newsAggPinnedClusters") || "{}");
        } catch {
          return {};
        }
      }

      function savePins() {
        try {
          localStorage.setItem("newsAggPinnedClusters", JSON.stringify(state.pins));
        } catch {
          // Ignore storage failures; pinned order still updates during this session.
        }
      }

      function pinTime(clusterId) {
        return state.pins[clusterId] || "";
      }

      function isPinned(clusterId) {
        return Boolean(pinTime(clusterId));
      }

      function togglePin(clusterId) {
        if (isPinned(clusterId)) {
          delete state.pins[clusterId];
        } else {
          state.pins[clusterId] = new Date().toISOString();
        }
        savePins();
      }

      function sortPinnedClusters(clusters) {
        return [...clusters].sort((a, b) => {
          const aPinned = pinTime(a.id);
          const bPinned = pinTime(b.id);
          if (aPinned && bPinned) return new Date(bPinned).getTime() - new Date(aPinned).getTime();
          if (aPinned) return -1;
          if (bPinned) return 1;
          return 0;
        });
      }

      function saveComments() {
        try {
          localStorage.setItem("newsAggPredictionComments", JSON.stringify(state.comments));
        } catch {
          // Ignore storage failures; comments still show during this session.
        }
      }

      function commentsForCluster(clusterId) {
        return state.comments[clusterId] || [];
      }

      function addComment(clusterId, text) {
        const trimmed = text.trim();
        if (!trimmed) return commentsForCluster(clusterId);
        const next = [
          ...commentsForCluster(clusterId),
          {
            text: trimmed,
            createdAt: new Date().toISOString(),
          },
        ];
        state.comments[clusterId] = next;
        saveComments();
        return next;
      }

      function commentTime(value) {
        const date = new Date(value);
        if (Number.isNaN(date.getTime())) return "";
        return date.toLocaleString(undefined, {
          month: "short",
          day: "numeric",
          hour: "numeric",
          minute: "2-digit",
        });
      }

      function renderComments(comments) {
        if (!comments.length) return "";
        return comments
          .map(
            (comment) =>
              `<div class="comment">
                ${escapeHtml(comment.text)}
                <span class="comment-time">${commentTime(comment.createdAt)}</span>
              </div>`,
          )
          .join("");
      }

      function saveVotes() {
        try {
          localStorage.setItem("newsAggPredictionVotes", JSON.stringify(state.votes));
        } catch {
          // Ignore storage failures; the on-page counts still update for this session.
        }
      }

      function voteForCluster(clusterId) {
        return state.votes[clusterId] || { agree: 0, disagree: 0, user: null };
      }

      function applyVote(clusterId, nextVote) {
        const vote = { ...voteForCluster(clusterId) };

        if (vote.user === nextVote) return vote;
        if (vote.user === "agree") vote.agree = Math.max(0, vote.agree - 1);
        if (vote.user === "disagree") vote.disagree = Math.max(0, vote.disagree - 1);

        if (nextVote === "agree") vote.agree += 1;
        if (nextVote === "disagree") vote.disagree += 1;
        vote.user = nextVote;

        state.votes[clusterId] = vote;
        saveVotes();
        return vote;
      }

      function optionList(values) {
        return [...new Set(values.filter(Boolean))].sort();
      }

      function tokenize(text) {
        return String(text || "")
          .toLowerCase()
          .replace(/[^a-z0-9\s-]/g, " ")
          .split(/\s+/)
          .map((word) => word.replace(/^-+|-+$/g, ""))
          .filter((word) => word.length > 2 && !stopwords.has(word));
      }

      function extractKeywords(article) {
        const sourceHints = [article.domain, ...(article.tags || [])]
          .filter(Boolean)
          .map((value) => String(value).toLowerCase())
          .filter((value) => !weakKeywords.has(value));
        const words = tokenize(`${article.headline} ${article.summary}`);
        const counts = new Map();

        for (const hint of sourceHints) {
          counts.set(hint, (counts.get(hint) || 0) + 3);
        }

        for (const word of words) {
          const inHeadline = (article.headline || "").toLowerCase().includes(word);
          counts.set(word, (counts.get(word) || 0) + (inHeadline ? 2 : 1));
        }

        return [...counts.entries()]
          .filter(([word]) => !weakKeywords.has(word))
          .sort((a, b) => b[1] - a[1] || a[0].localeCompare(b[0]))
          .slice(0, 6)
          .map(([word]) => word);
      }

      function clusterArticles(articles) {
        const clusters = new Map();

        for (const article of articles) {
          article.keywords = extractKeywords(article);
          const key = article.keywords.find((keyword) => !weakKeywords.has(keyword)) || article.domain || "general";
          if (!clusters.has(key)) {
            clusters.set(key, {
              key,
              keywords: new Map(),
              articles: [],
              sources: new Set(),
              domains: new Set(),
            });
          }
          const cluster = clusters.get(key);
          cluster.articles.push(article);
          if (article.source) cluster.sources.add(article.source);
          if (article.domain) cluster.domains.add(article.domain);
          for (const keyword of article.keywords) {
            cluster.keywords.set(keyword, (cluster.keywords.get(keyword) || 0) + 1);
          }
        }

        return [...clusters.values()]
          .map((cluster) => ({
            ...cluster,
            id: `${cluster.key}-${cluster.articles.map((article) => article.id).slice(0, 3).join("-")}`,
            articles: cluster.articles.sort((a, b) => {
              return new Date(b.date || 0).getTime() - new Date(a.date || 0).getTime();
            }),
            topKeywords: [...cluster.keywords.entries()]
              .sort((a, b) => b[1] - a[1] || a[0].localeCompare(b[0]))
              .slice(0, 8)
              .map(([word]) => word),
          }))
          .sort((a, b) => b.articles.length - a.articles.length || a.key.localeCompare(b.key));
      }

      function timelineGroups(articles) {
        const groups = new Map();

        for (const article of articles) {
          const day = timelineDay(article.date);
          if (!groups.has(day)) groups.set(day, []);
          groups.get(day).push(article);
        }

        return [...groups.entries()];
      }

      function fillOptions(select, values, label) {
        const selected = select.value;
        select.innerHTML = `<option value="">${label}</option>`;
        for (const value of values) {
          const option = document.createElement("option");
          option.value = value;
          option.textContent = value;
          select.append(option);
        }
        select.value = values.includes(selected) ? selected : "";
      }

      function applyFilters() {
        const q = searchEl.value.trim().toLowerCase();
        const domain = domainEl.value;
        const source = sourceEl.value;

        state.filtered = state.articles.filter((article) => {
          const searchable = [
            article.headline,
            article.summary,
            article.source,
            article.domain,
            ...(article.tags || []),
          ]
            .filter(Boolean)
            .join(" ")
            .toLowerCase();

          return (
            (!q || searchable.includes(q)) &&
            (!domain || article.domain === domain) &&
            (!source || article.source === source)
          );
        });
        state.clusters = clusterArticles(state.filtered);

        render();
      }

      function render() {
        articlesTabEl.classList.toggle("active", state.mode === "articles");
        clustersTabEl.classList.toggle("active", state.mode === "clusters");
        statusEl.textContent =
          state.mode === "clusters"
            ? `${state.clusters.length} clusters · ${state.filtered.length} articles`
            : `${state.filtered.length} shown · ${state.articles.length} fetched`;
        gridEl.innerHTML = "";

        if (!state.filtered.length) {
          gridEl.className = "";
          gridEl.innerHTML = '<div class="empty">No articles match the current filters.</div>';
          return;
        }

        if (state.mode === "clusters") {
          gridEl.className = "grid";
          for (const cluster of sortPinnedClusters(state.clusters)) {
            const card = document.createElement("article");
            const pinned = isPinned(cluster.id);
            card.className = `cluster${pinned ? " pinned" : ""}`;
            const sample = cluster.articles.slice(0, 5);
            const lead = cluster.articles[0];
            const imageArticle = clusterImageArticle(cluster);
            const title = oneLineSummary(lead, cluster.topKeywords);
            const groups = timelineGroups(sample);
            const vote = voteForCluster(cluster.id);
            const comments = commentsForCluster(cluster.id);
            card.innerHTML = `
              <div class="eyebrow">
                <span>${cluster.articles.length} articles</span>
                <span>
                  ${cluster.sources.size} sources
                  <button class="pin-button ${pinned ? "active" : ""}" type="button" data-pin="${escapeHtml(cluster.id)}">
                    ${pinned ? "Pinned" : "Pin"}
                  </button>
                </span>
              </div>
              ${articleVisual(imageArticle, { keywords: cluster.topKeywords, cluster: true })}
              <h2>${escapeHtml(title)}</h2>
              <div class="chips">
                ${cluster.topKeywords.map((keyword) => `<span class="chip">${escapeHtml(keyword)}</span>`).join("")}
              </div>
              <div class="timeline">
                ${groups
                  .map(
                    ([day, articles]) =>
                      `<div class="timeline-day">
                        <div class="timeline-day-title">${escapeHtml(day)}</div>
                        ${articles
                          .map(
                            (article) =>
                              `<div class="timeline-item">
                                <span class="timeline-time">${timelineTime(article.date) || timelineDate(article.date)}</span>
                                <span>
                                  <span class="timeline-source">${escapeHtml(article.source || "Unknown")}</span>:
                                  ${escapeHtml(oneLineSummary(article))}
                                </span>
                              </div>`,
                          )
                          .join("")}
                        <div class="prediction" data-cluster-id="${cluster.id}">
                          <span class="prediction-label">Predicted next</span>
                          ${escapeHtml(predictNextStep(cluster))}
                          <div class="prediction-actions">
                            <button type="button" data-vote="agree" class="${vote.user === "agree" ? "active" : ""}">
                              Agree <span class="vote-count" data-count="agree">${vote.agree}</span>
                            </button>
                            <button type="button" data-vote="disagree" class="${vote.user === "disagree" ? "active" : ""}">
                              Disagree <span class="vote-count" data-count="disagree">${vote.disagree}</span>
                            </button>
                          </div>
                          <div class="comments">
                            <form class="comment-form">
                              <input type="text" name="comment" placeholder="Add a comment" />
                              <button type="submit">Post</button>
                            </form>
                            <div class="comment-list">${renderComments(comments)}</div>
                          </div>
                        </div>
                      </div>`,
                  )
                  .join("")}
              </div>
            `;
            gridEl.append(card);
          }
          return;
        }

        gridEl.className = "grid";
        for (const article of state.filtered) {
          const card = document.createElement("article");
          card.innerHTML = `
            ${articleVisual(article)}
            <div class="eyebrow">
              <span>${escapeHtml(article.domain || "General")}</span>
              <span>${escapeHtml(article.source || "")} ${escapeHtml(shortDate(article.date))}</span>
            </div>
            <h2>${escapeHtml(article.headline || "Untitled")}</h2>
            <p>${escapeHtml(article.summary || "Summary unavailable.")}</p>
            <div class="chips">
              ${(article.keywords || []).map((keyword) => `<span class="chip">${escapeHtml(keyword)}</span>`).join("")}
            </div>
            ${article.url ? `<a href="${escapeHtml(article.url)}" target="_blank" rel="noreferrer">Open source</a>` : ""}
          `;
          gridEl.append(card);
        }
      }

      async function loadArticles() {
        statusEl.textContent = "Fetching external RSS feeds...";
        refreshEl.disabled = true;
        try {
          const dataUrl = location.port === "3000" ? "/api/rss" : "/articles-data.json";
          const response = await fetch(dataUrl, { cache: "no-store" });
          if (!response.ok) throw new Error(`RSS request failed: ${response.status}`);
          const payload = await response.json();
          state.articles = payload.articles || [];
          fillOptions(domainEl, optionList(state.articles.map((a) => a.domain)), "All sectors");
          fillOptions(sourceEl, optionList(state.articles.map((a) => a.source)), "All sources");
          applyFilters();
        } catch (error) {
          state.articles = [];
          state.filtered = [];
          gridEl.className = "";
          gridEl.innerHTML = `<div class="empty">${error.message || "Unable to fetch articles."}</div>`;
          statusEl.textContent = "Could not load RSS feeds.";
        } finally {
          refreshEl.disabled = false;
        }
      }

      searchEl.addEventListener("input", applyFilters);
      domainEl.addEventListener("change", applyFilters);
      sourceEl.addEventListener("change", applyFilters);
      refreshEl.addEventListener("click", loadArticles);
      gridEl.addEventListener("click", (event) => {
        const pinButton = event.target.closest("[data-pin]");
        if (pinButton) {
          togglePin(pinButton.dataset.pin);
          render();
          return;
        }

        const button = event.target.closest("[data-vote]");
        if (!button) return;

        const prediction = button.closest(".prediction");
        if (!prediction) return;
        const clusterId = prediction.dataset.clusterId;
        if (!clusterId) return;

        const vote = applyVote(clusterId, button.dataset.vote);
        const actionButtons = prediction.querySelectorAll("[data-vote]");
        actionButtons.forEach((item) => item.classList.toggle("active", item === button));

        const agreeCount = prediction.querySelector('[data-count="agree"]');
        const disagreeCount = prediction.querySelector('[data-count="disagree"]');
        if (agreeCount) agreeCount.textContent = vote.agree;
        if (disagreeCount) disagreeCount.textContent = vote.disagree;
      });
      gridEl.addEventListener("submit", (event) => {
        const form = event.target.closest(".comment-form");
        if (!form) return;
        event.preventDefault();

        const prediction = form.closest(".prediction");
        const clusterId = prediction?.dataset.clusterId;
        const input = form.querySelector('input[name="comment"]');
        const list = prediction?.querySelector(".comment-list");
        if (!clusterId || !input || !list) return;

        const comments = addComment(clusterId, input.value);
        input.value = "";
        list.innerHTML = renderComments(comments);
      });
      articlesTabEl.addEventListener("click", () => {
        state.mode = "articles";
        render();
      });
      clustersTabEl.addEventListener("click", () => {
        state.mode = "clusters";
        render();
      });

      loadArticles();
    </script>
  </body>
</html>
